<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Cantina Essência</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
</head>

<body>
  <div class="login-page">
    <div class="login-card fade-up">
      <div class="login-header">
        <div class="login-emoji">🔥</div>
        <h2 class="login-title">Admin Cantina</h2>
        <p class="login-subtitle">Acesso restrito</p>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="admin@essencia.com">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••">
      </div>

      <div class="login-error hidden" id="loginError"></div>

      <button class="btn btn-primary btn-lg btn-block mt-4" id="loginBtn">Entrar</button>

      <a href="/" style="display:block;text-align:center;margin-top:16px;color:var(--text-3);font-size:13px;">← Voltar
        ao cardápio</a>
    </div>
  </div>

  <script type="module">
    import { signIn, getSession, getMyRole } from '/assets/adminAuth.js';

    // Se já estiver com sessão, verificar se é admin
    getSession().then(async session => {
      if (session) {
        const role = await getMyRole();
        if (role === 'ADMIN') window.location.href = '/admin/orders.html';
      }
    });

    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('loginError');

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        errorEl.textContent = 'Preencha email e senha';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      errorEl.classList.add('hidden');

      try {
        await signIn(email, password);
        window.location.href = '/admin/products.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Email ou senha incorretos';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    btn.addEventListener('click', doLogin);
    document.getElementById('loginPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>

</html>
